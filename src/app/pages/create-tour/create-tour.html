<div class="create-tour-container">
  <div class="back-button">
    <a routerLink="/dashboard" class="btn-back">← Zurück zum Dashboard</a>
  </div>

  <h1>Neue Tour erstellen</h1>

  <div class="create-content">
    <aside class="form-section">
      <form class="tour-form">
        <div class="form-group">
          <label for="title">Titel:</label>
          <input id="title" type="text" [(ngModel)]="vm.title" name="title" required>
        </div>

        <div class="form-group">
          <label for="description">Beschreibung:</label>
          <textarea id="description" [(ngModel)]="vm.description" name="description" rows="2" placeholder="Beschreibe deine Tour..." required></textarea>
        </div>

        <div class="form-group">
          <label for="imageUrl">Bild-URL (optional)</label>
          <input id="imageUrl" type="url" [(ngModel)]="vm.imageUrl" name="imageUrl" placeholder="https://...">
        </div>

        <div class="form-group">
          <label for="vehicle">Fahrzeug:</label>
          <select id="vehicle" [(ngModel)]="vm.vehicleType" name="vehicle">
            <option value="cycling-regular">Fahrrad (normal)</option>
            <option value="cycling-road">Rennrad</option>
            <option value="cycling-mountain">Mountainbike</option>
            <option value="cycling-electric">E-Bike</option>
            <option value="driving-car">Auto</option>
            <option value="foot-walking">Zu Fuß</option>
            <option value="foot-hiking">Wandern</option>
          </select>
        </div>

        <div class="form-group">
          <label>Sichtbarkeit:</label>
          <div class="privacy-options">
            <label><input type="radio" name="visibility" [(ngModel)]="vm.isPublic" [value]="true"> Öffentlich</label>
            <label><input type="radio" name="visibility" [(ngModel)]="vm.isPublic" [value]="false"> Privat</label>
          </div>
        </div>

        <button type="button" class="btn-save" (click)="vm.saveTour()" [disabled]="!vm.isTourFormValid()">Tour speichern</button>
      </form>
    </aside>

    <section class="map-section">
      <h2>Wähle Start und Ende auf der Karte</h2>
      <p>1. Klick für Start (blauer Marker), 2. Klick für Ende (roter Marker).</p>
      <div class="map-container">
        <app-leaflet
          [interactable]="true"
          [vehicleType]="vm.vehicleType"
          (startCoordinateClicked)="vm.onStartSelected($event)"
          (endCoordinateClicked)="vm.onEndSelected($event)"
          (distance)="vm.setDistance($event)"
          (time)="vm.setTime($event)">
        </app-leaflet>
      </div>
    </section>
  </div>
</div>
