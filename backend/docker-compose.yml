services:
  database:
    image: postgres
    container_name: tourplanner-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tourplanner
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
      - ./db/test.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  database_data:
    driver: local